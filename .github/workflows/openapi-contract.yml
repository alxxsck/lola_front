name: OpenAPI contract

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openapi-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      LOLA_BACKEND_REF: ${{ vars.LOLA_BACKEND_REF || 'main' }}
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Require backend checkout token
        env:
          LOLA_BACKEND_READ_TOKEN: ${{ secrets.LOLA_BACKEND_READ_TOKEN }}
        run: test -n "$LOLA_BACKEND_READ_TOKEN"

      - name: Checkout explicitly configured backend contract source
        uses: actions/checkout@v4
        with:
          repository: alxxsck/lola_back
          ref: ${{ env.LOLA_BACKEND_REF }}
          token: ${{ secrets.LOLA_BACKEND_READ_TOKEN }}
          path: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify committed and live OpenAPI contracts
        working-directory: frontend
        env:
          LOLA_BACKEND_DIR: ${{ github.workspace }}/backend
        run: npm run api:check
